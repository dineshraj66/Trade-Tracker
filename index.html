<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Tracker</title>
  <meta name="description" content="Intraday Trade Tracker with Stats" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TradeTracker" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:      #0a0f1e;
      --bg2:     #111827;
      --bg3:     #1a2235;
      --card:    #141c2e;
      --border:  #1e2d45;
      --accent:  #00e5b0;
      --accent2: #ff6b35;
      --accent3: #7c5cfc;
      --text:    #e8edf5;
      --muted:   #6b7a99;
      --danger:  #ff4d6d;
      --warn:    #fbbf24;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
    }

    body {
      display: flex;
      flex-direction: column;
      /* constrain width on tablets/desktop, full width on mobile */
      max-width: 480px;
      margin: 0 auto;
      height: 100dvh;
      /* prevent body scroll — each page scrolls independently */
      overflow: hidden;
      position: relative;
    }

    /* ─── Header ─────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-title {
      font-family: var(--font-head);
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .app-title span { color: var(--text); }
    .header-date {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ─── Tabs ───────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ─── Pages ──────────────────────────────────── */
    .page {
      display: none;
      flex: 1;
      overflow-y: auto;
      /* bottom padding prevents content hiding under the FAB */
      padding: 14px 14px 90px;
    }
    .page.active { display: block; }

    /* ─── FAB ────────────────────────────────────── */
    /* Uses position:absolute so it stays inside the body container (max-width 480px)
       and never goes off-screen on any mobile device */
    .fab {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      border: none;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,229,176,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 100;
      /* respect iOS safe area */
      margin-bottom: env(safe-area-inset-bottom, 0px);
    }
    .fab:active { transform: scale(0.94); }
    .fab-hidden { display: none !important; }

    /* ─── Level group header ──────────────────────── */
    .level-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0 6px;
      margin-top: 6px;
    }
    .level-badge {
      background: rgba(251,191,36,0.15);
      color: var(--warn);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 6px;
      padding: 3px 10px;
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .level-line { flex: 1; height: 1px; background: var(--border); }

    /* ─── Trade banner (header above each card) ───── */
    .trade-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .trade-banner:active { border-color: var(--accent3); }
    .trade-banner-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .trade-num {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      background: rgba(0,229,176,0.12);
      border: 1px solid rgba(0,229,176,0.25);
      border-radius: 4px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .trade-banner-date {
      font-size: 10px;
      color: var(--text);
      font-weight: 700;
    }
    .trade-banner-day {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag-lvl-inline {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      background: rgba(251,191,36,0.15);
      color: var(--warn);
      border: 1px solid rgba(251,191,36,0.3);
      white-space: nowrap;
    }

    /* ─── Trade card ──────────────────────────────── */
    .trade-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .trade-card:active { border-color: var(--accent3); }
    .trade-instrument {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .trade-time { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 700; }
    .trade-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 7px;
    }
    .tag {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tag-strategy { background: rgba(124,92,252,0.2); color: var(--accent3); border: 1px solid rgba(124,92,252,0.3); }
    .tag-entry    { background: rgba(0,229,176,0.15);  color: var(--accent);  border: 1px solid rgba(0,229,176,0.25); }
    .tag-structure{ background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.25); }
    .tag-exit     { background: rgba(255,77,109,0.15); color: var(--danger);  border: 1px solid rgba(255,77,109,0.25); }
    .tag-sector   { background: rgba(107,122,153,0.15);color: var(--muted);   border: 1px solid rgba(107,122,153,0.25); }
    .trade-meta   { display:flex; gap:10px; margin-top:7px; font-size:10px; color:var(--muted); flex-wrap:wrap; }

    /* ─── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 480px;
      max-height: 92dvh;
      overflow-y: auto;
      padding: 22px 18px 44px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 18px;
      color: var(--accent);
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    /* ─── Form ────────────────────────────────────── */
    .form-group { margin-bottom: 13px; }
    .form-label {
      display: block;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 700;
    }
    .form-control {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-control:focus { border-color: var(--accent); }
    select.form-control { cursor: pointer; }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr 76px;
      gap: 8px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .toggle-label { font-size: 11px; color: var(--text); line-height: 1.4; padding-right: 10px; }
    .toggle { position:relative; width:40px; height:22px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider:before {
      content:'';
      position:absolute;
      width:16px; height:16px;
      left:3px; bottom:3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color:#000; width:100%; margin-top:8px; }
    .btn-primary:hover { background: #00c99a; }
    .btn-danger {
      background: rgba(255,77,109,0.15);
      color: var(--danger);
      border: 1px solid rgba(255,77,109,0.3);
      width: 100%;
      margin-top: 6px;
    }

    /* ─── Stats ───────────────────────────────────── */
    .stats-section { margin-bottom: 22px; }
    .stats-section-title {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 8px;
      text-align: center;
    }
    .stat-val {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stat-lbl { font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }
    .stat-card-full { grid-column:span 3; text-align:left; padding:12px 14px; }
    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }
    .period-filter { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
    .period-btn {
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .period-btn.active { background:rgba(0,229,176,0.15); border-color:var(--accent); color:var(--accent); }
    .progress-bar-wrap { background:var(--bg3); border-radius:4px; height:5px; width:100%; margin-top:5px; }
    .progress-bar { height:5px; border-radius:4px; background:var(--accent); transition:width 0.4s; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-state .icon { font-size:44px; margin-bottom:12px; }
    .empty-state p { font-size:13px; line-height:1.6; }
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 700;
      z-index: 999;
      white-space: nowrap;
      display: none;
    }
    .toast.show { display:block; animation:fadeInOut 2.5s forwards; }
    @keyframes fadeInOut {
      0%  { opacity:0; transform:translateX(-50%) translateY(10px); }
      15% { opacity:1; transform:translateX(-50%) translateY(0); }
      80% { opacity:1; }
      100%{ opacity:0; }
    }
    .loading { text-align:center; padding:40px; color:var(--muted); font-size:12px; }
    .spinner {
      width:26px; height:26px;
      border:3px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin:0 auto 12px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    @media (max-width:360px) {
      .stat-grid { grid-template-columns:repeat(2,1fr); }
      .stat-card-full { grid-column:span 2; }
    }

    /* ─── Celebration overlay ─────────────────────── */
    .celebrate-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .celebrate-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .celebrate-card {
      background: linear-gradient(135deg, #0f1e2e 0%, #0a1628 100%);
      border: 2px solid var(--accent);
      border-radius: 20px;
      padding: 32px 28px 28px;
      text-align: center;
      max-width: 300px;
      width: 88%;
      box-shadow: 0 0 60px rgba(0,229,176,0.25), 0 20px 60px rgba(0,0,0,0.6);
      animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
      overflow: hidden;
    }
    @keyframes cardPop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .celebrate-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,229,176,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .celebrate-emoji {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 14px;
      animation: bounce 0.6s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    .celebrate-title {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .celebrate-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .celebrate-sub span {
      color: var(--warn);
      font-weight: 700;
    }
    .celebrate-dismiss {
      margin-top: 22px;
      padding: 10px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      pointer-events: auto;
    }
    .celebrate-dismiss:active { transform: scale(0.96); }

    /* confetti pieces */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 499;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
    }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────── -->
<header class="app-header">
  <div>
    <div class="app-title">Trade<span>Tracker</span></div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div style="font-size:10px;color:var(--muted)" id="syncStatus">🔴 Local</div>
</header>

<!-- ─── Tabs ────────────────────────────────────── -->
<nav class="tabs">
  <button class="tab-btn" onclick="switchTab('stats')"  id="tab-stats" >📊 Stats</button>
  <button class="tab-btn" onclick="switchTab('trades')" id="tab-trades">📋 Trades</button>
</nav>

<!-- ─── Stats Page ───────────────────────────────── -->
<div class="page" id="page-stats">
  <div class="period-filter">
    <button class="period-btn active" onclick="setPeriod('all',this)">All</button>
    <button class="period-btn" onclick="setPeriod('week',this)">This Week</button>
    <button class="period-btn" onclick="setPeriod('month',this)">This Month</button>
  </div>
  <div id="statsContent">
    <div class="loading"><div class="spinner"></div>Loading stats…</div>
  </div>
</div>

<!-- ─── Trades Page ──────────────────────────────── -->
<div class="page" id="page-trades">
  <div id="tradesList">
    <div class="loading"><div class="spinner"></div>Loading trades…</div>
  </div>
</div>

<!-- ─── FAB (absolute, stays inside body max-width) ─ -->
<button class="fab fab-hidden" id="fabBtn" onclick="openModal()" title="Add Trade">+</button>

<!-- ─── Toast ────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── Celebration Overlay ──────────────────────── -->
<div class="celebrate-overlay" id="celebrateOverlay">
  <div class="celebrate-card">
    <div class="celebrate-emoji">🎉</div>
    <div class="celebrate-title">Trade Completed<br>As Per Plan!</div>
    <div class="celebrate-sub">
      <span>+1 Data Point</span> collected for<br>
      Large Sample Size 📊
    </div>
    <button class="celebrate-dismiss" onclick="dismissCelebration()">Keep Going! 🚀</button>
  </div>
</div>

<!-- ═══════════ ADD / EDIT MODAL ════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">New Trade</div>

    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" class="form-control" id="fDate" />
    </div>
    <div class="form-group">
      <label class="form-label">Instrument Name</label>
      <input type="text" class="form-control" id="fInstrument" placeholder="e.g. NIFTY, BANKNIFTY" />
    </div>
    <div class="form-group">
      <label class="form-label">Sector</label>
      <input type="text" class="form-control" id="fSector" placeholder="e.g. Banking, IT" list="sectorList" />
      <datalist id="sectorList"></datalist>
    </div>
    <div class="form-group">
      <label class="form-label">Strategy</label>
      <select class="form-control" id="fStrategy">
        <option value="1 CBO">1 CBO</option>
        <option value="Huge CBO">Huge CBO</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Entry Type</label>
      <select class="form-control" id="fEntryType">
        <option value="Entry after pullback">Entry after pullback</option>
        <option value="Direct Entry">Direct Entry</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Structure</label>
      <select class="form-control" id="fStructure">
        <option value="Same">Same</option>
        <option value="Different">Different</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Entry Time</label>
      <div class="time-row">
        <input type="number" class="form-control" id="fHour" min="1" max="12" placeholder="HH" />
        <input type="number" class="form-control" id="fMin"  min="0" max="59" placeholder="MM" />
        <select class="form-control" id="fAmpm">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Current Level (numeric)</label>
      <input type="number" class="form-control" id="fLevel" placeholder="e.g. 3" />
    </div>
    <div class="form-group">
      <label class="form-label">Exit Category</label>
      <select class="form-control" id="fExitCategory">
        <option value="Price hit Candle HL and Stayed Above">Price hit Candle HL and Stayed Above</option>
        <option value="Price Hit Candle HL and Stayed there">Price Hit Candle HL and Stayed there</option>
        <option value="Price Candle HL and Reversed">Price Candle HL and Reversed</option>
        <option value="Price Flat">Price Flat</option>
        <option value="Price hit SL">Price hit SL</option>
      </select>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Shut machine after one trade?</span>
      <label class="toggle">
        <input type="checkbox" id="fShutMachine" />
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Do not watch PNL in position page?</span>
      <label class="toggle">
        <input type="checkbox" id="fNoPnl" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" onclick="saveTrade()">Save Trade</button>
    <button class="btn btn-danger" id="deleteBtn" onclick="deleteTrade()" style="display:none">Delete Trade</button>
  </div>
</div>

<!-- ═════════════ FIREBASE + APP LOGIC ══════════ -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, addDoc, getDocs, updateDoc,
    deleteDoc, doc, query, orderBy, onSnapshot
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  /* ══════════════════════════════════════════════════════════
     ⚠️  PASTE YOUR FIREBASE CONFIG HERE
     Go to Firebase Console → Project Settings → Your apps → Config
     ══════════════════════════════════════════════════════════ */
  const firebaseConfig = {
    apiKey: "AIzaSyCr5O3rDc-UfazAwnqTS8KOEvn22ksHu3U",
  authDomain: "trade-tracker-71027.firebaseapp.com",
  projectId: "trade-tracker-71027",
  storageBucket: "trade-tracker-71027.firebasestorage.app",
  messagingSenderId: "702315259190",
  appId: "1:702315259190:web:e2716abba4080558dc3f97",
  measurementId: "G-Y6C9270SJ5"
  };
  /* ══════════════════════════════════════════════════════════ */

  let db        = null;
  let trades    = [];
  let editingId = null;
  let currentPeriod = 'all';
  let charts = {};
  let unsubscribe = null;   // real-time listener handle

  /* ── Firebase init ───────────────────────────── */
  const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";
  try {
    if (isConfigured) {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      document.getElementById('syncStatus').textContent = '🟢 Synced';
      document.getElementById('syncStatus').style.color = 'var(--accent)';
    } else {
      document.getElementById('syncStatus').textContent = '🔴 Local';
    }
  } catch(e) {
    console.warn('Firebase init failed', e);
    document.getElementById('syncStatus').textContent = '🔴 Error';
  }

  /* ── Helpers ─────────────────────────────────── */
  window.showToast = msg => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show';
    setTimeout(() => t.className = 'toast', 2700);
  };

  /* ── Celebration ──────────────────────────────── */
  window.launchCelebration = function() {
    // Fire confetti
    const colors = ['#00e5b0','#ff6b35','#7c5cfc','#fbbf24','#ff4d6d','#ffffff','#00d4ff'];
    const count  = 80;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left     = Math.random() * 100 + 'vw';
      piece.style.top      = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width    = (6 + Math.random() * 8) + 'px';
      piece.style.height   = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration  = (1.5 + Math.random() * 2) + 's';
      piece.style.animationDelay     = (Math.random() * 0.6) + 's';
      document.body.appendChild(piece);
      // remove after animation
      setTimeout(() => piece.remove(), 4000);
    }
    // Show card
    const overlay = document.getElementById('celebrateOverlay');
    overlay.classList.add('show');
  };

  window.dismissCelebration = function() {
    document.getElementById('celebrateOverlay').classList.remove('show');
  };

  // Dismiss on overlay background click
  document.getElementById('celebrateOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('celebrateOverlay')) dismissCelebration();
  });

  const fmtDate = iso => {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN',
      { day:'2-digit', month:'short', year:'numeric' });
  };
  const fmtDay = iso => {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'long' });
  };
  const isoWeek = iso => {
    const d = new Date(iso + 'T00:00:00');
    const s = new Date(d);
    s.setDate(d.getDate() - d.getDay() + 1);
    return s.toISOString().slice(0,10);
  };
  const isoMonth = iso => iso ? iso.slice(0,7) : '';
  const daysBetween = (d1, d2) => {
    let a = new Date(d1+'T00:00:00'), b = new Date(d2+'T00:00:00');
    if (a > b) [a,b]=[b,a];
    let n=0, c=new Date(a);
    c.setDate(c.getDate()+1);
    while(c<b){ if(c.getDay()!==0&&c.getDay()!==6) n++; c.setDate(c.getDate()+1); }
    return n;
  };

  /* ── Load — real-time listener ──────────────────── */
  async function loadTrades() {
    if (db) {
      // Real-time listener: any change on any device updates instantly
      try {
        const q = query(collection(db, 'trades'), orderBy('date', 'asc'));
        unsubscribe = onSnapshot(q, (snap) => {
          trades = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          localStorage.setItem('tt_trades', JSON.stringify(trades));
          populateSectors();
          renderTrades();
          renderStats();
          // Update sync indicator briefly
          const s = document.getElementById('syncStatus');
          s.textContent = '🟢 Synced';
          s.style.color = 'var(--accent)';
        }, (err) => {
          console.warn('Snapshot error', err);
          // Fall back to local
          trades = JSON.parse(localStorage.getItem('tt_trades') || '[]');
          populateSectors(); renderTrades(); renderStats();
          document.getElementById('syncStatus').textContent = '🔴 Local';
        });
        return; // onSnapshot handles rendering
      } catch(e) {
        console.warn('Firebase listen failed', e);
      }
    }
    // No Firebase — load from localStorage
    trades = JSON.parse(localStorage.getItem('tt_trades') || '[]');
    populateSectors();
    renderTrades();
    renderStats();
  }

  function populateSectors() {
    const sectors = [...new Set(trades.map(t=>t.sector).filter(Boolean))].sort();
    document.getElementById('sectorList').innerHTML = sectors.map(s=>`<option value="${s}">`).join('');
  }

  /* ── Save ────────────────────────────────────── */
  window.saveTrade = async function() {
    const h    = parseInt(document.getElementById('fHour').value)||0;
    const m    = parseInt(document.getElementById('fMin').value) ||0;
    const ampm = document.getElementById('fAmpm').value;
    const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`;

    const isNew = !editingId;

    const tradeData = {
      date:         document.getElementById('fDate').value,
      instrument:   document.getElementById('fInstrument').value.trim(),
      sector:       document.getElementById('fSector').value.trim(),
      strategy:     document.getElementById('fStrategy').value,
      entryType:    document.getElementById('fEntryType').value,
      entryTime:    timeStr,
      structure:    document.getElementById('fStructure').value,
      level:        parseInt(document.getElementById('fLevel').value)||0,
      exitCategory: document.getElementById('fExitCategory').value,
      shutMachine:  document.getElementById('fShutMachine').checked,
      noPnl:        document.getElementById('fNoPnl').checked,
    };

    // Only stamp createdAt on brand new trades, never on edits
    if (isNew) tradeData.createdAt = Date.now();

    if (!tradeData.date || !tradeData.instrument) {
      showToast('Date & Instrument required!');
      return;
    }

    if (db) {
      // Firebase mode: write to Firestore only.
      // The onSnapshot listener automatically updates trades[] and re-renders.
      // Never mutate trades[] here — that causes double-updates and data corruption.
      try {
        if (editingId) {
          await updateDoc(doc(db, 'trades', editingId), tradeData);
        } else {
          await addDoc(collection(db, 'trades'), tradeData);
        }
        closeModal();
        if (isNew) launchCelebration();
        else showToast('Trade updated!');
      } catch(e) {
        console.error('Firebase save error', e);
        showToast('Save failed — check connection.');
      }
    } else {
      // Local-only mode: mutate array directly then re-render
      if (editingId) {
        const i = trades.findIndex(t => t.id === editingId);
        if (i !== -1) trades[i] = { ...trades[i], ...tradeData };
      } else {
        trades.push({ id: 'local_' + Date.now(), ...tradeData });
      }
      localStorage.setItem('tt_trades', JSON.stringify(trades));
      closeModal();
      populateSectors(); renderTrades(); renderStats();
      if (isNew) launchCelebration();
      else showToast('Trade updated!');
    }
  };

  /* ── Delete ──────────────────────────────────── */
  window.deleteTrade = async function() {
    if (!editingId || !confirm('Delete this trade?')) return;
    const idToDelete = editingId;
    if (db) {
      // Firebase mode: delete from Firestore, onSnapshot handles UI update
      try {
        await deleteDoc(doc(db, 'trades', idToDelete));
        closeModal();
        showToast('Trade deleted.');
      } catch(e) {
        console.error('Delete error', e);
        showToast('Delete failed — check connection.');
      }
    } else {
      // Local-only mode
      trades = trades.filter(t => t.id !== idToDelete);
      localStorage.setItem('tt_trades', JSON.stringify(trades));
      closeModal();
      populateSectors(); renderTrades(); renderStats();
      showToast('Trade deleted.');
    }
  };

  /* ── Modal open/close ────────────────────────── */
  window.openModal = function(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Trade' : 'New Trade';
    document.getElementById('deleteBtn').style.display = id ? 'block' : 'none';

    if (id) {
      const t = trades.find(x=>x.id===id);
      if (t) {
        document.getElementById('fDate').value          = t.date;
        document.getElementById('fInstrument').value    = t.instrument;
        document.getElementById('fSector').value        = t.sector||'';
        document.getElementById('fStrategy').value      = t.strategy;
        document.getElementById('fEntryType').value     = t.entryType;
        document.getElementById('fStructure').value     = t.structure||'Same';
        document.getElementById('fLevel').value         = t.level||'';
        document.getElementById('fExitCategory').value  = t.exitCategory;
        document.getElementById('fShutMachine').checked = !!t.shutMachine;
        document.getElementById('fNoPnl').checked       = !!t.noPnl;
        if (t.entryTime) {
          const [hm,ap] = t.entryTime.split(' ');
          const [hh,mm] = (hm||'').split(':');
          document.getElementById('fHour').value  = hh||'';
          document.getElementById('fMin').value   = mm||'';
          document.getElementById('fAmpm').value  = ap||'AM';
        }
      }
    } else {
      document.getElementById('fDate').value          = new Date().toISOString().slice(0,10);
      document.getElementById('fInstrument').value    = '';
      document.getElementById('fSector').value        = '';
      document.getElementById('fStrategy').value      = '1 CBO';
      document.getElementById('fEntryType').value     = 'Entry after pullback';
      document.getElementById('fStructure').value     = 'Same';
      document.getElementById('fLevel').value         = '';
      document.getElementById('fExitCategory').value  = 'Price hit Candle HL and Stayed Above';
      document.getElementById('fShutMachine').checked = false;
      document.getElementById('fNoPnl').checked       = false;
      document.getElementById('fHour').value          = '';
      document.getElementById('fMin').value           = '';
      document.getElementById('fAmpm').value          = 'AM';
    }
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  };
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  /* ── Tab switch ──────────────────────────────── */
  window.switchTab = function(tab) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+tab).classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
    const fab = document.getElementById('fabBtn');
    tab==='trades' ? fab.classList.remove('fab-hidden') : fab.classList.add('fab-hidden');
  };

  /* ── Period filter ───────────────────────────── */
  window.setPeriod = function(period, btn) {
    currentPeriod = period;
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderStats();
  };
  function filterByPeriod(list) {
    if (currentPeriod==='all') return list;
    const now = new Date();
    return list.filter(t=>{
      if (!t.date) return false;
      const d = new Date(t.date+'T00:00:00');
      if (currentPeriod==='week') {
        const s=new Date(now); s.setDate(now.getDate()-now.getDay()+1); s.setHours(0,0,0,0);
        return d>=s;
      }
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
  }

  /* ── Render Trades ───────────────────────────── */
  window.renderTrades = function() {
    const el = document.getElementById('tradesList');
    el.innerHTML = '';

    if (!trades.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📈</div><p>No trades yet.<br>Tap + to log your first trade.</p></div>`;
      return;
    }

    // Sort ascending by date then createdAt
    const sorted = [...trades].sort((a,b) =>
      (a.date||'').localeCompare(b.date||'') || (a.createdAt||0)-(b.createdAt||0)
    );

    // Group by level
    const byLevel = {};
    sorted.forEach(t => {
      const lv = t.level ?? 0;
      if (!byLevel[lv]) byLevel[lv] = [];
      byLevel[lv].push(t);
    });

    // Render highest level first
    Object.keys(byLevel).map(Number).sort((a,b)=>b-a).forEach(lv => {
      // Level group header
      const gh = document.createElement('div');
      gh.className = 'level-group-header';
      gh.innerHTML = `<span class="level-badge">Level ${lv}</span><span class="level-line"></span>`;
      el.appendChild(gh);

      byLevel[lv].forEach((t, idx) => {
        const tradeNum = idx + 1;    // 1-based within this level

        // Banner
        const banner = document.createElement('div');
        banner.className = 'trade-banner';
        banner.innerHTML = `
          <div class="trade-banner-left">
            <span class="trade-num">Trade ${tradeNum}</span>
            <div>
              <div class="trade-banner-date">${fmtDate(t.date)}</div>
              <div class="trade-banner-day">${fmtDay(t.date)}</div>
            </div>
          </div>
          <span class="tag-lvl-inline">Level ${lv}</span>`;
        banner.onclick = () => openModal(t.id);
        el.appendChild(banner);
      });
    });

    // FAB spacer
    const sp = document.createElement('div');
    sp.style.height = '70px';
    el.appendChild(sp);
  };

  /* ── Render Stats ────────────────────────────── */
  function destroyCharts() {
    Object.values(charts).forEach(c=>{ try{c.destroy();}catch(e){} });
    charts = {};
  }

  // Entry time bucket classifier
  function timeBucket(entryTime) {
    if (!entryTime) return 'Other';
    const parts = entryTime.split(' ');
    const hm    = (parts[0]||'').split(':');
    let h = parseInt(hm[0])||0;
    const m = parseInt(hm[1])||0;
    const ap = parts[1]||'AM';
    if (ap==='PM' && h!==12) h+=12;
    if (ap==='AM' && h===12) h=0;
    const mins = h*60+m;
    if (mins >= 10*60+15 && mins <= 11*60)    return '10:15AM–11:00AM';
    if (mins >= 11*60+15 && mins <= 12*60)    return '11:15AM–12:00PM';
    if (mins >= 12*60+15 && mins <= 13*60)    return '12:15PM–1:00PM';
    return 'Other';
  }

  window.renderStats = function() {
    destroyCharts();
    const list = filterByPeriod(trades);
    const el   = document.getElementById('statsContent');
    if (!list.length) {
      el.innerHTML=`<div class="empty-state"><div class="icon">📊</div><p>No trades in this period.<br>Add trades to see analytics.</p></div>`;
      return;
    }
    const total=list.length;
    const byLevel={}, byWeek={}, byMonth={}, byEntry={}, byStruct={}, byExit={};
    const byTimeBucket={}, bySector={}, byDay={};
    const DAY_ORDER=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    const sorted=[...list].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    sorted.forEach(t=>{
      const lv=t.level??0, wk=isoWeek(t.date), mo=isoMonth(t.date);
      byLevel[lv]             = (byLevel[lv]||0)+1;
      byWeek[wk]              = (byWeek[wk]||0)+1;
      byMonth[mo]             = (byMonth[mo]||0)+1;
      byEntry[t.entryType||'?']    = (byEntry[t.entryType||'?']||0)+1;
      byStruct[t.structure||'?']   = (byStruct[t.structure||'?']||0)+1;
      byExit[t.exitCategory||'?']  = (byExit[t.exitCategory||'?']||0)+1;
      const tb = timeBucket(t.entryTime);
      byTimeBucket[tb] = (byTimeBucket[tb]||0)+1;
      const sec = t.sector || 'Unknown';
      bySector[sec] = (bySector[sec]||0)+1;
      const day = fmtDay(t.date);
      byDay[day] = (byDay[day]||0)+1;
    });

    const datesUniq=[...new Set(sorted.map(t=>t.date).filter(Boolean))];
    const waitDays=[];
    for(let i=1;i<datesUniq.length;i++) waitDays.push(daysBetween(datesUniq[i-1],datesUniq[i]));
    const avgWait=waitDays.length?(waitDays.reduce((a,b)=>a+b,0)/waitDays.length).toFixed(1):'—';

    // Exit category sorted high to low by count
    const exitSorted = Object.entries(byExit).sort((a,b)=>b[1]-a[1]);

    // Sector sorted high to low
    const sectorSorted = Object.entries(bySector).sort((a,b)=>b[1]-a[1]);

    // Day sorted by DAY_ORDER
    const daySorted = DAY_ORDER
      .filter(d => byDay[d])
      .map(d => [d, byDay[d]]);

    // Time bucket order
    const TB_ORDER = ['10:15AM–11:00AM','11:15AM–12:00PM','12:15PM–1:00PM','Other'];
    const timeSorted = TB_ORDER.filter(k=>byTimeBucket[k]).map(k=>[k,byTimeBucket[k]]);

    // Chart config factory — with datalabels on top of bars
    const barCfg = (color) => ({
      plugins:{
        legend:{display:false},
        datalabels:{
          anchor:'end', align:'end',
          color:'#e8edf5',
          font:{size:9, weight:'bold'},
          formatter: v => v
        }
      },
      scales:{
        x:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'}},
        y:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'}, beginAtZero:true}
      },
      layout:{ padding:{ top:16 } },
      responsive:true
    });

    const lineCfg = {
      plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{
        x:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'}},
        y:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'}}
      },
      responsive:true
    };

    el.innerHTML=`
      <div class="stats-section">
        <div class="stats-section-title">Overview</div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Trades</div></div>
          <div class="stat-card"><div class="stat-val">${Object.keys(byLevel).length}</div><div class="stat-lbl">Levels</div></div>
          <div class="stat-card"><div class="stat-val">${avgWait}d</div><div class="stat-lbl">Avg Gap</div></div>
          <div class="stat-card"><div class="stat-val">${list.filter(t=>t.shutMachine).length}</div><div class="stat-lbl">Shut Mach</div></div>
          <div class="stat-card"><div class="stat-val">${list.filter(t=>t.noPnl).length}</div><div class="stat-lbl">No PNL</div></div>
          <div class="stat-card"><div class="stat-val">${Object.keys(byWeek).length}</div><div class="stat-lbl">Wks Active</div></div>
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Trades by Level</div>
        <div class="chart-box"><canvas id="chartLevel" height="160"></canvas></div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">Trades by Week</div>
        <div class="chart-box"><canvas id="chartWeek" height="160"></canvas></div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">Trades by Month</div>
        <div class="chart-box"><canvas id="chartMonth" height="160"></canvas></div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">Trading Day Gaps (weekends excluded)</div>
        <div class="chart-box" id="waitBox"><canvas id="chartWait" height="150"></canvas></div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Trades by Day of Week</div>
        <div class="chart-box"><canvas id="chartDay" height="160"></canvas></div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Trades by Entry Time Slot</div>
        <div class="chart-box"><canvas id="chartTime" height="160"></canvas></div>
        <div style="margin-top:8px">
          ${timeSorted.map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px">
              <span style="color:var(--muted)">${k}</span>
              <span style="color:var(--text);font-weight:700">${v} &nbsp;<span style="color:var(--muted)">${Math.round(v/total*100)}%</span></span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Trades by Sector</div>
        <div class="chart-box"><canvas id="chartSector" height="160"></canvas></div>
        <div style="margin-top:8px">
          ${sectorSorted.map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:10px;color:var(--muted)">${k}</span>
              <span style="font-size:10px;color:var(--text);font-weight:700">${v} &nbsp;<span style="color:var(--muted)">${Math.round(v/total*100)}%</span></span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Entry Type</div>
        <div class="stat-grid">
          ${Object.entries(byEntry).map(([k,v])=>`<div class="stat-card">
            <div class="stat-val" style="font-size:18px">${v}</div>
            <div class="stat-lbl" style="margin-bottom:3px">${Math.round(v/total*100)}%</div>
            <div class="stat-lbl">${k}</div>
            <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(v/total*100)}%"></div></div>
          </div>`).join('')}
        </div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">Structure</div>
        <div class="stat-grid">
          ${Object.entries(byStruct).map(([k,v])=>`<div class="stat-card">
            <div class="stat-val" style="font-size:18px">${v}</div>
            <div class="stat-lbl" style="margin-bottom:3px">${Math.round(v/total*100)}%</div>
            <div class="stat-lbl">${k}</div>
            <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(v/total*100)}%;background:var(--accent3)"></div></div>
          </div>`).join('')}
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">Exit Category</div>
        <div class="stat-grid">
          ${exitSorted.map(([k,v])=>`<div class="stat-card stat-card-full">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:10px;color:var(--text)">${k}</span>
              <span style="font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--accent2)">${v}
                <span style="font-size:10px;color:var(--muted)">${Math.round(v/total*100)}%</span>
              </span>
            </div>
            <div class="progress-bar-wrap" style="margin-top:6px">
              <div class="progress-bar" style="width:${Math.round(v/total*100)}%;background:var(--accent2)"></div>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div style="height:20px"></div>`;

    // Register Chart.js datalabels plugin inline
    const datalabelsPlugin = {
      id:'datalabels',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          meta.data.forEach((bar, idx) => {
            const val = dataset.data[idx];
            if (val === undefined || val === null) return;
            ctx.save();
            ctx.fillStyle = '#e8edf5';
            ctx.font = 'bold 9px Space Mono, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(val, bar.x, bar.y - 2);
            ctx.restore();
          });
        });
      }
    };

    const mkBar = (id, labels, data, color) => new Chart(document.getElementById(id), {
      type:'bar',
      plugins:[datalabelsPlugin],
      data:{
        labels,
        datasets:[{ data, backgroundColor:color, borderRadius:6 }]
      },
      options:{
        plugins:{ legend:{display:false} },
        scales:{
          x:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'}},
          y:{ticks:{color:'#6b7a99',font:{size:9}},grid:{color:'#1e2d45'},beginAtZero:true}
        },
        layout:{ padding:{ top:18 } },
        responsive:true
      }
    });

    charts.level  = mkBar('chartLevel',  Object.keys(byLevel).map(l=>'Lvl '+l),   Object.values(byLevel),  '#00e5b0');
    charts.week   = mkBar('chartWeek',   Object.keys(byWeek).map(w=>w.slice(5)),   Object.values(byWeek),   '#7c5cfc');
    charts.month  = mkBar('chartMonth',  Object.keys(byMonth),                     Object.values(byMonth),  '#ff6b35');
    charts.day    = mkBar('chartDay',    daySorted.map(([d])=>d.slice(0,3)),        daySorted.map(([,v])=>v),'#00d4ff');
    charts.time   = mkBar('chartTime',   timeSorted.map(([k])=>k),                  timeSorted.map(([,v])=>v),'#fbbf24');
    charts.sector = mkBar('chartSector', sectorSorted.map(([k])=>k),               sectorSorted.map(([,v])=>v),'#ff6b35');

    if(waitDays.length>1){
      charts.wait=new Chart(document.getElementById('chartWait'),{
        type:'line',
        data:{labels:waitDays.map((_,i)=>'Gap '+(i+1)),
          datasets:[{data:waitDays,borderColor:'#00e5b0',backgroundColor:'rgba(0,229,176,0.1)',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#00e5b0'}]},
        options:lineCfg
      });
    } else {
      document.getElementById('waitBox').innerHTML='<div style="text-align:center;padding:18px;color:var(--muted);font-size:11px">Need 2+ trade dates for gap analysis</div>';
    }
  };

  /* ── Init ────────────────────────────────────── */
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  switchTab('stats');
  loadTrades();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
